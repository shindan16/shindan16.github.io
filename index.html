/* ===== INIT ===== */
(function init(){
  const grid=document.getElementById('div-grid');
  DIVISIONS.forEach(d=>{
    const el=document.createElement('div');
    el.className='div-card';
    el.innerHTML=`<div class="div-label">${d.label}</div><div class="div-sub">${d.sub}</div>`;
    el.onclick=()=>{
      grid.querySelectorAll('.div-card').forEach(c=>c.classList.remove('selected'));
      el.classList.add('selected');
      selectedDiv=d.id;
      document.getElementById('btn-div-next').disabled=false;
    };
    grid.appendChild(el);
  });
  document.getElementById('btn-div-next').onclick=()=>{show('sec-body');buildBody()};
  document.getElementById('btn-retry').onclick=()=>{
    scores={A:0,C:0,P:0,S:0,I:0,T:0,D:0,F:0};
    currentQ=0;bodyInfo={};selectedDiv=null;
    if(myChart){myChart.destroy();myChart=null}
    if(shareChart){shareChart.destroy();shareChart=null}
    document.getElementById('div-grid').querySelectorAll('.div-card').forEach(c=>c.classList.remove('selected'));
    document.getElementById('btn-div-next').disabled=true;
    show('sec-division');
  };
})();

function show(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ===== BUILD BODY FORM ===== */
function buildBody(){
  const o=bodyOpts(selectedDiv);
  const isE=selectedDiv==='elem';
  document.getElementById('body-title').textContent=isE?'からだのじょうほうをいれてね':'身体情報を入力';
  const f=document.getElementById('body-form');
  f.innerHTML='';
  const fields=[
    {key:'ht',label:o.htLabel,opts:o.htOpts},
    {key:'wt',label:o.wtLabel,opts:o.wtOpts},
    {key:'flex',label:o.flexLabel,opts:o.flexOpts},
    {key:'dex',label:o.dexLabel,opts:o.dexOpts},
    {key:'exp',label:o.expLabel,opts:o.expOpts}
  ];
  fields.forEach(fi=>{
    const g=document.createElement('div');g.className='form-group';
    const lb=document.createElement('label');lb.textContent=fi.label;g.appendChild(lb);
    const sel=document.createElement('select');sel.id='bf-'+fi.key;
    const defOpt=document.createElement('option');defOpt.value='';defOpt.textContent=isE?'えらんでね':'選択してください';sel.appendChild(defOpt);
    fi.opts.forEach((op,i)=>{const oo=document.createElement('option');oo.value=i;oo.textContent=op;sel.appendChild(oo)});
    g.appendChild(sel);f.appendChild(g);
  });
  const btn=document.getElementById('btn-body-next');
  btn.textContent=isE?'しんだんスタート！':'診断スタート';
  btn.onclick=()=>{
    const vals={};let ok=true;
    fields.forEach(fi=>{const v=document.getElementById('bf-'+fi.key).value;if(v==='')ok=false;else vals[fi.key]=parseInt(v)});
    if(!ok){alert(isE?'ぜんぶえらんでね！':'すべて選択してください');return}
    bodyInfo=vals;show('sec-quiz');startQuiz();
  };
}

/* ===== QUIZ ===== */
function startQuiz(){currentQ=0;renderQ()}
function renderQ(){
  const q=QUESTIONS[currentQ];
  const isE=selectedDiv==='elem';
  document.getElementById('prog-bar').style.width=((currentQ/QUESTIONS.length)*100)+'%';
  document.getElementById('q-cat').textContent=isE?q.eCat:q.cat;
  document.getElementById('q-num').textContent=`Q${currentQ+1} / ${QUESTIONS.length}`;
  document.getElementById('q-text').textContent=isE?q.eText:q.text;
  const opts=isE?q.eOpts:q.opts;
  const box=document.getElementById('q-opts');box.innerHTML='';
  opts.forEach((o)=>{
    const b=document.createElement('button');b.className='btn-choice';b.textContent=o[0];
    b.onclick=()=>answer(o[1],q.axis);
    box.appendChild(b);
  });
}
function answer(val,axes){
  if(val>0){scores[axes[0]]+=Math.abs(val)}
  else{scores[axes[1]]+=Math.abs(val)}
  currentQ++;
  if(currentQ<QUESTIONS.length){renderQ()}
  else{show('sec-result');showResult()}
}

/* ===== RESULT ===== */
function showResult(){
  const isE=selectedDiv==='elem';
  /* type code */
  const c1=scores.A>=scores.C?'A':'C';
  const c2=scores.P>=scores.S?'P':'S';
  const c3=scores.I>=scores.T?'I':'T';
  const c4=scores.D>=scores.F?'D':'F';
  const code=c1+c2+c3+c4;

  const td=isE?elemTypeData[code]:typeData[code];

  /* axis ratios */
  const rAC=(scores.A+1)/(scores.A+scores.C+2);
  const rPS=(scores.P+1)/(scores.P+scores.S+2);
  const rIT=(scores.I+1)/(scores.I+scores.T+2);
  const rDF=(scores.D+1)/(scores.D+scores.F+2);

  /* body normalizations (0-1) */
  const htN=bodyInfo.ht/4;
  const wtN=bodyInfo.wt/4;
  const flexN=bodyInfo.flex/3;
  const dexN=bodyInfo.dex/3;
  const expN=bodyInfo.exp/4;

  /* 8 params */
  const clamp=v=>Math.round(Math.max(5,Math.min(100,v)));
  const params=[
    clamp(rPS*35+wtN*25+rAC*10+(1-rDF)*5+expN*20+5),           // 破壊力
    clamp((1-rPS)*30+(1-wtN)*10+rAC*15+dexN*10+expN*15+15),     // 瞬発力
    clamp((1-rIT)*30+dexN*15+flexN*10+expN*30+10),               // 技術力
    clamp((1-rAC)*25+(1-rIT)*10+rDF*5+(1-rDF)*10+expN*25+flexN*5+15), // 防御力
    clamp(wtN*10+(1-rPS)*10+rDF*10+expN*25+rAC*10+30),          // スタミナ
    clamp(rDF*25+rAC*15+expN*20+(1-rIT)*5+15),                   // 精神力
    clamp(htN*40+flexN*15+expN*10+25),                            // リーチ
    clamp((1-rIT)*20+dexN*20+flexN*15+expN*25+15)                // 技の多彩さ
  ];

  /* main result */
  const rm=document.getElementById('result-main');
  rm.innerHTML=`
    <div class="type-badge">${code}</div>
    <div class="type-title">${td.title}</div>
    <p class="type-desc">${td.desc}</p>
  `;

  /* param bars */
  const pNames=isE?paramNamesElem:paramNames;
  const rp=document.getElementById('result-params');
  rp.innerHTML=`<h2>${isE?'キミのパラメータ':'パラメータ分析'}</h2>`;
  params.forEach((v,i)=>{
    const row=document.createElement('div');row.className='axis-row';
    row.innerHTML=`<div class="axis-label">${pNames[i]}</div><div class="axis-track"><div class="axis-fill" style="width:0;background:${paramColors[i]}"></div></div><div class="axis-val">${v}</div>`;
    rp.appendChild(row);
    setTimeout(()=>{row.querySelector('.axis-fill').style.width=v+'%'},100+i*80);
  });

  /* radar chart */
  document.getElementById('chart-heading').textContent=isE?'パラメータチャート':'パラメータチャート';
  if(myChart){myChart.destroy()}
  const ctx=document.getElementById('radarCanvas').getContext('2d');
  myChart=new Chart(ctx,{
    type:'radar',
    data:{
      labels:pNames,
      datasets:[{
        label:code,
        data:params,
        backgroundColor:'rgba(139,37,0,.15)',
        borderColor:'#8b2500',
        borderWidth:2,
        pointBackgroundColor:'#8b2500',
        pointRadius:3
      }]
    },
    options:{
      scales:{r:{min:0,max:100,ticks:{stepSize:20,font:{size:10},backdropColor:'transparent'},grid:{color:'#c4b08b55'},pointLabels:{font:{size:11,family:'Noto Sans JP'},color:'#2c2c2c'}}},
      plugins:{legend:{display:false}},
      animation:{duration:1200}
    }
  });

  /* compatibility */
  const comp=compatData[code];
  const goodTd=isE?elemTypeData[comp.good]:typeData[comp.good];
  const badTd=isE?elemTypeData[comp.bad]:typeData[comp.bad];
  const rc=document.getElementById('result-compat');
  rc.innerHTML=`
    <h2>${isE?'あいしょうチェック！':'タイプ相性'}</h2>
    <p style="font-size:.85rem;color:#666;margin-bottom:10px">${isE?'きみのタイプとあいしょうのいいタイプ・にがてなタイプだよ！':'あなたのタイプとの相性を確認しよう'}</p>
    <div class="compat-panel">
      <div class="compat-card compat-good">
        <h4>${isE?'🤝 あいしょう◎':'🤝 好相性'}</h4>
        <div class="compat-code">${comp.good}</div>
        <div style="font-size:.85rem;color:#8b2500">${goodTd.title}</div>
        <div class="compat-reason">${isE?comp.goodR.replace(/[^\u3040-\u309Fー\u30A0-\u30FFa-zA-Z0-9！、。 ]/g,''):comp.goodR}</div>
      </div>
      <div class="compat-card compat-bad">
        <h4>${isE?'⚡ にがて…':'⚡ 苦手タイプ'}</h4>
        <div class="compat-code">${comp.bad}</div>
        <div style="font-size:.85rem;color:#8b2500">${badTd.title}</div>
        <div class="compat-reason">${isE?comp.badR.replace(/[^\u3040-\u309Fー\u30A0-\u30FFa-zA-Z0-9！、。 ]/g,''):comp.badR}</div>
      </div>
    </div>
    <p style="font-size:.82rem;color:#888;margin-top:10px;text-align:center">${isE?'ともだちやどうじょうのなかまにもやってもらおう！':'道場仲間にも診断してもらって相性をチェック！'}</p>
  `;

  /* technique recommendation */
  const techScores=TECHNIQUES.map(t=>{
    let sc=0;
    Object.entries(t.factors).forEach(([k,w])=>{
      if(k==='wt')sc+=wtN*w*10;
      else if(k==='ht')sc+=htN*w*10;
      else if(k==='flex')sc+=flexN*w*10;
      else if(k==='dex')sc+=dexN*w*10;
      else{
        const sv=scores[k]||0;
        sc+=sv*w;
      }
    });
    return{...t,sc};
  });
  techScores.sort((a,b)=>b.sc-a.sc);
  const top8=techScores.slice(0,8);
  const rt=document.getElementById('result-tech');
  rt.innerHTML=`<h2>${isE?'🥋 キミにあうわざ':'🥋 おすすめ技'}</h2><div class="tech-list">${top8.map(t=>`<div class="tech-tag">${isE?t.eName:t.name}</div>`).join('')}</div>`;

  /* advice */
  const ra=document.getElementById('result-advice');
  let adv='';
  if(isE){
    adv+=`<strong>🌟 アドバイス</strong><br>`;
    if(c1==='A')adv+='きみはせめるのがとくい！でも、まもりもれんしゅうするともっとつよくなれるよ。';
    else adv+='きみはまもりやカウンターがじょうず！たまにはじぶんからせめるれんしゅうもしてみよう。';
    adv+='<br>';
    if(c2==='P')adv+='パワーがあるから、スピードれんしゅうもするとむてきだよ！';
    else adv+='スピードがとくいだね！たいかんトレーニングでパワーもつけるとさいきょう！';
    adv+='<br>';
    if(flexN<0.4)adv+='からだがかたいから、まいにちストレッチしよう！けりがもっとカッコよくなるよ。';
    if(dexN<0.4)adv+='なわとびやボールあそびで、てあしをきようにするれんしゅうもいいね！';
    adv+='<br>まいにちのれんしゅうをがんばろう！おす！';
  }else{
    adv+=`<strong>分析アドバイス</strong><br>`;
    if(c1==='A')adv+='攻撃型のスタイルが明確です。防御の引き出しを増やすことで、さらに安定した試合運びが可能になります。';
    else adv+='カウンター・守備型のスタイルです。自分から攻撃を仕掛ける練習を取り入れると、相手にプレッシャーを与えられる幅が広がります。';
    adv+='<br>';
    if(c2==='P')adv+='パワーが武器です。スピードトレーニング（ラダー、縄跳び等）を加えると、パワーの活きるタイミングが増えます。';
    else adv+='スピードが強みです。ウェイトトレーニングで体幹と打撃の威力を強化すると、決定力が向上します。';
    adv+='<br>';
    if(c3==='I')adv+='直感型の判断力があります。試合映像の分析を習慣化すると、直感の精度がさらに上がります。';
    else adv+='分析型の強みがあります。スパーリングの頻度を上げ、実戦での判断スピードを鍛えましょう。';
    adv+='<br>';
    if(flexN<0.4)adv+='柔軟性の向上が課題です。毎日のストレッチで蹴り技の幅を広げましょう。';
    if(dexN<0.4)adv+='器用さを高めるコーディネーショントレーニングを推奨します。';
    if(htN>=0.75)adv+='長身を活かした前蹴り・膝蹴りなど距離を活かす技が有効です。';
    else if(htN<=0.25)adv+='接近戦での下突きや膝蹴りなど、懐に入る戦術が有効です。';
  }
  ra.innerHTML=`<div class="advice-box">${adv}</div>`;

  /* share buttons */
  const shareText=`【極真空手16タイプ診断】\n結果: ${code}「${td.title}」\n${pNames.map((n,i)=>n+':'+params[i]).join(' / ')}\n\nあなたも診断してみよう！`;

  document.getElementById('btn-share-x').onclick=()=>{
    window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(shareText),'_blank');
  };
  document.getElementById('btn-share-line').onclick=()=>{
    window.open('https://social-plugins.line.me/lineit/share?text='+encodeURIComponent(shareText),'_blank');
  };

  /* share image */
  document.getElementById('sc-type-code').textContent=code;
  document.getElementById('sc-type-title').textContent=td.title;

  /* draw share radar */
  if(shareChart){shareChart.destroy()}
  const sctx=document.getElementById('shareRadar').getContext('2d');
  shareChart=new Chart(sctx,{
    type:'radar',
    data:{
      labels:pNames,
      datasets:[{data:params,backgroundColor:'rgba(139,37,0,.15)',borderColor:'#8b2500',borderWidth:2,pointBackgroundColor:'#8b2500',pointRadius:3}]
    },
    options:{
      scales:{r:{min:0,max:100,ticks:{stepSize:20,font:{size:9},backdropColor:'transparent'},grid:{color:'#c4b08b55'},pointLabels:{font:{size:10},color:'#2c2c2c'}}},
      plugins:{legend:{display:false}},
      animation:{duration:0}
    }
  });

  document.getElementById('btn-share-img').onclick=function(){
    const btn=this;
    btn.textContent='生成中...';btn.disabled=true;
    setTimeout(()=>{
      html2canvas(document.getElementById('share-card'),{scale:2,backgroundColor:'#f5f0e8',useCORS:true}).then(canvas=>{
        if(navigator.share&&navigator.canShare){
          canvas.toBlob(blob=>{
            const file=new File([blob],'karate-type.png',{type:'image/png'});
            if(navigator.canShare({files:[file]})){
              navigator.share({files:[file],title:'極真空手16タイプ診断',text:shareText}).catch(()=>{});
            }else{dl(canvas)}
            btn.textContent='📸 画像を保存';btn.disabled=false;
          });
        }else{
          dl(canvas);
          btn.textContent='📸 画像を保存';btn.disabled=false;
        }
      }).catch(()=>{
        alert('画像生成に失敗しました');
        btn.textContent='📸 画像を保存';btn.disabled=false;
      });
    },500);
  };
}

function dl(canvas){
  const a=document.createElement('a');a.download='karate-type.png';a.href=canvas.toDataURL('image/png');a.click();
}
</script>
